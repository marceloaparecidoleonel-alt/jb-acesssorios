<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8dcc8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0c4b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b8a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2317;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#e8c76b;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="necklaceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0d878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(212, 175, 55, 0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(212, 175, 55, 0);stop-opacity:1" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feOffset dx="2" dy="4" result="offsetBlur" />
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over" />
    </filter>
    <filter id="goldShine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="600" height="800" fill="url(#bgGradient)" />
  
  <!-- Soft gradient glow behind the model -->
  <ellipse cx="300" cy="400" rx="220" ry="300" fill="url(#glow)" />
  <ellipse cx="300" cy="420" rx="160" ry="220" fill="rgba(212, 175, 55, 0.08)" />
  
  <!-- Model -->
  <g transform="translate(40, 30)">
    <!-- Hair - more realistic layered -->
    <path d="M180 60 Q160 40 200 30 Q250 20 300 35 Q350 50 380 80 Q410 110 400 150 Q390 190 360 210 Q330 230 300 225 Q270 220 240 200 Q210 180 190 140 Q170 100 180 60" fill="url(#hairGradient)" filter="url(#softShadow)" />
    <path d="M190 70 Q175 55 210 45 Q255 35 300 50 Q345 65 370 95 Q390 125 380 160 Q370 195 345 210 Q320 225 300 220 Q280 215 255 200 Q230 185 210 150 Q195 110 190 70" fill="rgba(44, 24, 16, 0.3)" />
    
    <!-- Face - more detailed -->
    <ellipse cx="280" cy="140" rx="60" ry="70" fill="url(#skinGradient)" filter="url(#softShadow)" />
    
    <!-- Eyes -->
    <ellipse cx="255" cy="135" rx="12" ry="8" fill="#ffffff" />
    <ellipse cx="305" cy="135" rx="12" ry="8" fill="#ffffff" />
    <ellipse cx="257" cy="136" rx="6" ry="6" fill="#3d2317" />
    <ellipse cx="307" cy="136" rx="6" ry="6" fill="#3d2317" />
    <circle cx="259" cy="134" r="2" fill="#ffffff" opacity="0.8" />
    <circle cx="309" cy="134" r="2" fill="#ffffff" opacity="0.8" />
    
    <!-- Eyebrows -->
    <path d="M240 120 Q255 115 270 120" fill="none" stroke="#2c1810" stroke-width="2" stroke-linecap="round" />
    <path d="M290 120 Q305 115 320 120" fill="none" stroke="#2c1810" stroke-width="2" stroke-linecap="round" />
    
    <!-- Nose -->
    <path d="M280 140 L278 155 Q280 158 282 155 L280 140" fill="rgba(0,0,0,0.1)" />
    
    <!-- Lips -->
    <path d="M265 175 Q280 180 295 175 Q280 185 265 175" fill="#e8a090" />
    <path d="M268 173 Q280 176 292 173" fill="rgba(255,255,255,0.3)" />
    
    <!-- Neck -->
    <path d="M255 205 Q280 215 305 205 Q325 210 345 220 Q360 235 355 270 Q320 285 280 280 Q240 285 205 270 Q200 235 215 220 Q235 210 255 205" fill="url(#skinGradient)" />
    
    <!-- Shoulders and upper body -->
    <path d="M170 270 Q200 255 255 265 Q280 275 305 265 Q355 255 390 270 Q420 285 440 330 Q460 375 440 420 Q400 445 280 435 Q160 445 120 420 Q100 375 120 330 Q140 285 170 270" fill="url(#skinGradient)" filter="url(#softShadow)" />
    
    <!-- Dress/clothing -->
    <path d="M120 330 Q160 310 280 320 Q400 310 440 330 Q460 400 440 480 Q400 560 280 580 Q160 560 120 480 Q100 400 120 330" fill="#ffffff" opacity="0.95" filter="url(#softShadow)" />
    <path d="M130 340 Q170 325 280 335 Q390 325 430 340 Q445 400 425 470 Q385 540 280 555 Q175 540 135 470 Q115 400 130 340" fill="rgba(240,240,240,0.5)" />
    
    <!-- Necklace - elegant chain -->
    <path d="M220 295 Q280 340 340 295" fill="none" stroke="url(#necklaceGradient)" stroke-width="4" stroke-linecap="round" filter="url(#goldShine)" />
    
    <!-- Necklace - main pendant -->
    <ellipse cx="280" cy="325" rx="18" ry="22" fill="url(#goldGradient)" filter="url(#goldShine)" />
    <ellipse cx="280" cy="325" rx="12" ry="15" fill="url(#goldGradient)" opacity="0.9" />
    <ellipse cx="280" cy="325" rx="6" ry="8" fill="rgba(255,255,255,0.4)" />
    
    <!-- Necklace - side beads -->
    <circle cx="235" cy="305" r="6" fill="url(#goldGradient)" filter="url(#goldShine)" />
    <circle cx="255" cy="318" r="6" fill="url(#goldGradient)" filter="url(#goldShine)" />
    <circle cx="305" cy="318" r="6" fill="url(#goldGradient)" filter="url(#goldShine)" />
    <circle cx="325" cy="305" r="6" fill="url(#goldGradient)" filter="url(#goldShine)" />
    
    <!-- Earrings - left - more detailed -->
    <path d="M225 115 L225 175" fill="none" stroke="url(#goldGradient)" stroke-width="3" filter="url(#goldShine)" />
    <circle cx="225" cy="182" r="12" fill="url(#goldGradient)" filter="url(#goldShine)" />
    <circle cx="225" cy="182" r="8" fill="url(#goldGradient)" opacity="0.85" />
    <circle cx="225" cy="182" r="4" fill="rgba(255,255,255,0.5)" />
    <circle cx="225" cy="195" r="5" fill="url(#goldGradient)" filter="url(#goldShine)" />
    
    <!-- Earrings - right - more detailed -->
    <path d="M335 115 L335 175" fill="none" stroke="url(#goldGradient)" stroke-width="3" filter="url(#goldShine)" />
    <circle cx="335" cy="182" r="12" fill="url(#goldGradient)" filter="url(#goldShine)" />
    <circle cx="335" cy="182" r="8" fill="url(#goldGradient)" opacity="0.85" />
    <circle cx="335" cy="182" r="4" fill="rgba(255,255,255,0.5)" />
    <circle cx="335" cy="195" r="5" fill="url(#goldGradient)" filter="url(#goldShine)" />
    
    <!-- Additional jewelry details -->
    <path d="M245 300 Q280 330 315 300" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.7" />
    
    <!-- Shine effects on jewelry -->
    <ellipse cx="280" cy="320" rx="8" ry="4" fill="rgba(255, 255, 255, 0.7)" />
    <ellipse cx="225" cy="180" rx="5" ry="2" fill="rgba(255, 255, 255, 0.7)" />
    <ellipse cx="335" cy="180" rx="5" ry="2" fill="rgba(255, 255, 255, 0.7)" />
    <ellipse cx="235" cy="303" rx="3" ry="1.5" fill="rgba(255, 255, 255, 0.6)" />
    <ellipse cx="325" cy="303" rx="3" ry="1.5" fill="rgba(255, 255, 255, 0.6)" />
  </g>
</svg>
