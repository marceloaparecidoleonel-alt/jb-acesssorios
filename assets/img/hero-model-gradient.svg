<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d0c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8b8a8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e5c76b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="necklaceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e5c76b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earringGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="600" height="800" fill="url(#bgGradient)" />
  
  <!-- Soft gradient behind the model -->
  <ellipse cx="300" cy="400" rx="200" ry="280" fill="rgba(212, 175, 55, 0.08)" />
  <ellipse cx="300" cy="420" rx="150" ry="200" fill="rgba(212, 175, 55, 0.12)" />
  
  <!-- Model silhouette -->
  <g transform="translate(50, 50)">
    <!-- Hair -->
    <path d="M200 80 Q180 60 220 50 Q260 40 300 55 Q340 70 360 100 Q380 130 370 160 Q360 190 340 200 Q320 210 300 205 Q280 200 260 190 Q240 180 220 160 Q200 140 200 80" fill="url(#hairGradient)" />
    
    <!-- Face -->
    <ellipse cx="280" cy="140" rx="55" ry="65" fill="url(#skinGradient)" />
    
    <!-- Neck -->
    <path d="M260 200 Q280 210 300 205 Q320 200 340 200 Q350 220 345 260 Q320 270 300 265 Q280 270 255 260 Q250 220 260 200" fill="url(#skinGradient)" />
    
    <!-- Shoulders and upper body -->
    <path d="M180 260 Q200 250 255 260 Q280 270 300 265 Q320 270 345 260 Q400 250 420 260 Q440 280 450 320 Q460 360 440 400 Q400 420 300 410 Q200 420 160 400 Q140 360 150 320 Q160 280 180 260" fill="url(#skinGradient)" />
    
    <!-- Dress/clothing -->
    <path d="M150 320 Q200 300 300 310 Q400 300 450 320 Q460 380 440 450 Q400 520 300 530 Q200 520 160 450 Q140 380 150 320" fill="#ffffff" opacity="0.9" />
    
    <!-- Necklace - main chain -->
    <path d="M230 280 Q280 320 330 280" fill="none" stroke="url(#necklaceGradient)" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)" />
    
    <!-- Necklace - pendant -->
    <circle cx="280" cy="305" r="12" fill="url(#goldGradient)" filter="url(#softGlow)" />
    <circle cx="280" cy="305" r="8" fill="url(#goldGradient)" opacity="0.8" />
    
    <!-- Necklace - additional beads -->
    <circle cx="245" cy="290" r="4" fill="url(#goldGradient)" />
    <circle cx="260" cy="300" r="4" fill="url(#goldGradient)" />
    <circle cx="300" cy="300" r="4" fill="url(#goldGradient)" />
    <circle cx="315" cy="290" r="4" fill="url(#goldGradient)" />
    
    <!-- Earrings - left -->
    <path d="M225 130 L225 180" fill="none" stroke="url(#earringGradient)" stroke-width="2" />
    <circle cx="225" cy="185" r="8" fill="url(#goldGradient)" filter="url(#softGlow)" />
    <circle cx="225" cy="185" r="5" fill="url(#goldGradient)" opacity="0.7" />
    
    <!-- Earrings - right -->
    <path d="M335 130 L335 180" fill="none" stroke="url(#earringGradient)" stroke-width="2" />
    <circle cx="335" cy="185" r="8" fill="url(#goldGradient)" filter="url(#softGlow)" />
    <circle cx="335" cy="185" r="5" fill="url(#goldGradient)" opacity="0.7" />
    
    <!-- Subtle shine on jewelry -->
    <ellipse cx="280" cy="302" rx="6" ry="3" fill="rgba(255, 255, 255, 0.6)" />
    <ellipse cx="225" cy="183" rx="4" ry="2" fill="rgba(255, 255, 255, 0.6)" />
    <ellipse cx="335" cy="183" rx="4" ry="2" fill="rgba(255, 255, 255, 0.6)" />
  </g>
</svg>
